<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: hsl(220 20% 97%);
        color: hsl(224 50% 10%);
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-shell {
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        background:
          radial-gradient(circle at top, hsl(217 91% 50% / 0.10), transparent 40%),
          hsl(220 20% 97%);
      }

      .boot-shell__content {
        width: 100%;
        max-width: 960px;
        display: grid;
        gap: 20px;
      }

      .boot-shell__brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .boot-shell__logo {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, hsl(217 91% 50%), hsl(230 80% 56%));
        color: white;
        font-weight: 700;
      }

      .boot-shell__title {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.4rem);
        line-height: 1.1;
      }

      .boot-shell__text {
        margin: 0;
        max-width: 42rem;
        color: hsl(220 9% 46%);
        font-size: 1rem;
        line-height: 1.6;
      }

      .boot-shell__card {
        border-radius: 24px;
        background: hsl(0 0% 100% / 0.92);
        border: 1px solid hsl(220 13% 89%);
        box-shadow: 0 24px 48px -8px hsl(0 0% 0% / 0.12);
        padding: 20px;
      }

      .boot-shell__line {
        height: 14px;
        border-radius: 999px;
        margin-bottom: 12px;
        background: linear-gradient(90deg, hsl(220 14% 92%), hsl(220 14% 96%), hsl(220 14% 92%));
        background-size: 200% 100%;
        animation: shellPulse 1.4s ease-in-out infinite;
      }

      .boot-shell__line--lg { height: 44px; border-radius: 14px; }
      .boot-shell__line--sm { width: 28%; }
      .boot-shell__grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin-top: 8px;
      }

      .boot-shell__tile {
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(90deg, hsl(220 14% 92%), hsl(220 14% 96%), hsl(220 14% 92%));
        background-size: 200% 100%;
        animation: shellPulse 1.4s ease-in-out infinite;
      }

      @keyframes shellPulse {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @media (min-width: 900px) {
        .boot-shell__content {
          grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
          align-items: center;
          gap: 40px;
        }
      }
    </style>

    <!-- Preconnect hints for faster resource loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://kvygdphglkxqtaoxlzmh.supabase.co" />

    <!-- SPA redirect handler (used by public/404.html fallback) -->
    <script>
      (function () {
        try {
          const params = new URLSearchParams(window.location.search);
          const redirect = params.get('redirect');
          if (!redirect) return;

          params.delete('redirect');
          const rest = params.toString();
          const decoded = decodeURIComponent(redirect);
          const nextUrl = decoded + (rest ? (decoded.includes('?') ? '&' : '?') + rest : '');
          window.history.replaceState(null, '', nextUrl);
        } catch {
          // ignore
        }
      })();
    </script>

    <title>Zentrek - Employee Attendance Management</title>
    <meta name="description" content="Professional employee attendance management with GPS tracking, face verification, and real-time reporting. Track attendance, manage leaves, and generate reports." />
    <meta name="author" content="Zentrek" />
    <meta name="keywords" content="attendance, employee management, GPS tracking, face verification, time tracking, HR software" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Zentrek" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Zentrek - Employee Attendance Management" />
    <meta property="og:description" content="Professional employee attendance management with GPS tracking, face verification, and real-time reporting." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zentrek - Employee Attendance Management" />
    <meta name="twitter:description" content="Professional employee attendance management with GPS tracking and face verification." />
    <meta name="twitter:image" content="/pwa-512x512.png" />

    <!-- Canonical -->
    <link rel="canonical" href="/" />
  </head>

  <body>
    <!-- Skip to main content link for keyboard users -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[9999] focus:bg-primary focus:text-primary-foreground focus:px-4 focus:py-2 focus:rounded-md focus:text-sm focus:font-medium">Skip to main content</a>
    <div id="root">
      <main class="boot-shell" aria-label="Application loading shell">
        <div class="boot-shell__content">
          <section>
            <div class="boot-shell__brand">
              <span class="boot-shell__logo">Z</span>
              <div>
                <strong>Zentrek</strong><br />
                <span style="color:hsl(220 9% 46%); font-size: 0.9rem;">HR, payroll, and attendance platform</span>
              </div>
            </div>
            <h1 class="boot-shell__title">Your workspace is loading — visible immediately.</h1>
            <p class="boot-shell__text">This fallback shell ensures mobile visitors always see meaningful content right away, even before JavaScript, authentication, or API requests complete.</p>
          </section>
          <section class="boot-shell__card" aria-hidden="true">
            <div class="boot-shell__line boot-shell__line--sm"></div>
            <div class="boot-shell__line boot-shell__line--lg"></div>
            <div class="boot-shell__line boot-shell__line--lg"></div>
            <div class="boot-shell__line boot-shell__line--lg"></div>
            <div class="boot-shell__grid">
              <div class="boot-shell__tile"></div>
              <div class="boot-shell__tile"></div>
              <div class="boot-shell__tile"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
